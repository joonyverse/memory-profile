services:
  influxdb:
    image: influxdb:2.7
    container_name: pahole-influxdb
    ports:
      - "8086:8086"
    environment:
      DOCKER_INFLUXDB_INIT_MODE: setup
      DOCKER_INFLUXDB_INIT_USERNAME: admin
      DOCKER_INFLUXDB_INIT_PASSWORD: adminpassword
      DOCKER_INFLUXDB_INIT_ORG: memory-profile
      DOCKER_INFLUXDB_INIT_BUCKET: pahole
      DOCKER_INFLUXDB_INIT_ADMIN_TOKEN: dev-token-123
    volumes:
      - influxdb-data:/var/lib/influxdb2

volumes:
  influxdb-data:
